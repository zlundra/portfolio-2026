  <polygon points="572,106 582,110 572,114" fill="#afa9ec" opacity="0.4"/>

  <rect x="582" y="80" width="108" height="60" rx="8" fill="rgba(175,169,236,0.1)" stroke="rgba(175,169,236,0.35)" stroke-width="1"/>
  <text x="636" y="106" font-family="monospace" font-size="9" fill="#afa9ec" text-anchor="middle" letter-spacing="1">PHASE 5</text>
  <text x="636" y="122" font-family="monospace" font-size="10" fill="#eeedfe" text-anchor="middle" font-weight="600">Sign-off</text>
  <line x1="690" y1="110" x2="710" y2="110" stroke="#afa9ec" stroke-width="1" opacity="0.4"/>
  <polygon points="710,106 720,110 710,114" fill="#afa9ec" opacity="0.4"/>

