  <text x="84" y="122" font-family="monospace" font-size="10" fill="#eeedfe" text-anchor="middle" font-weight="600">Pre-migration</text>
  <line x1="138" y1="110" x2="158" y2="110" stroke="#afa9ec" stroke-width="1" opacity="0.4"/>
