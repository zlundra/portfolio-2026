  <text x="564" y="255" font-family="monospace" font-size="11" fill="#eeedfe" font-weight="600">Sign-off document</text>
  <text x="564" y="272" font-family="monospace" font-size="10" fill="#6a6a8a">Evidence pack attached</text>
  <text x="564" y="288" font-family="monospace" font-size="10" fill="#6a6a8a">Sponsor signature</text>
  <text x="564" y="304" font-family="monospace" font-size="10" fill="#6a6a8a">Go-live date recorded</text>

  <!-- Title -->
  <text x="40" y="378" font-family="monospace" font-size="11" fill="#6a6a8a" letter-spacing="2">DATA MIGRATION RECONCILIATION PLAYBOOK</text>
