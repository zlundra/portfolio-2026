  <line x1="0" y1="320" x2="800" y2="320" stroke="#afa9ec" stroke-width="0.4" opacity="0.1"/>
  <!-- Funnel bars -->
  <rect x="100" y="60" width="600" height="52" rx="6" fill="rgba(124,92,252,0.18)" stroke="#7c5cfc" stroke-width="1"/>
  <rect x="120" y="132" width="520" height="52" rx="6" fill="rgba(29,158,117,0.15)" stroke="#1d9e75" stroke-width="1"/>
